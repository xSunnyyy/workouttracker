<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#000000"/>

  <!-- M -->
  <text x="155" y="320" font-family="DejaVu Sans, Arial Black, sans-serif"
        font-weight="900" font-size="220" fill="#ffffff"
        text-anchor="middle" dominant-baseline="alphabetic">M</text>

  <!-- L -->
  <text x="357" y="320" font-family="DejaVu Sans, Arial Black, sans-serif"
        font-weight="900" font-size="220" fill="#ffffff"
        text-anchor="middle" dominant-baseline="alphabetic">L</text>

  <!-- Vertical dumbbell centered between the letters -->
  <g transform="translate(256 256)" fill="#7ad341">
    <!-- Bar -->
    <rect x="-12" y="-58" width="24" height="116" rx="10"/>
    <!-- Top inner plate -->
    <rect x="-36" y="-72" width="72" height="14" rx="5"/>
    <!-- Top outer plate -->
    <rect x="-46" y="-92" width="92" height="18" rx="6"/>
    <!-- Top cap -->
    <rect x="-26" y="-104" width="52" height="10" rx="5"/>
    <!-- Bottom inner plate -->
    <rect x="-36" y="58" width="72" height="14" rx="5"/>
    <!-- Bottom outer plate -->
    <rect x="-46" y="74" width="92" height="18" rx="6"/>
    <!-- Bottom cap -->
    <rect x="-26" y="94" width="52" height="10" rx="5"/>
  </g>
</svg>
