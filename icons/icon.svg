<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0e14"/>
      <stop offset="100%" stop-color="#1a1c26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b4ff39"/>
      <stop offset="100%" stop-color="#7af5ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Dumbbell glyph -->
  <g transform="translate(256 256)" stroke="url(#accent)" stroke-linecap="round" fill="none">
    <!-- Bar -->
    <line x1="-120" y1="0" x2="120" y2="0" stroke-width="36"/>
    <!-- Left plates -->
    <line x1="-150" y1="-70" x2="-150" y2="70" stroke-width="62"/>
    <line x1="-190" y1="-44" x2="-190" y2="44" stroke-width="50"/>
    <!-- Right plates -->
    <line x1="150" y1="-70" x2="150" y2="70" stroke-width="62"/>
    <line x1="190" y1="-44" x2="190" y2="44" stroke-width="50"/>
  </g>
</svg>
